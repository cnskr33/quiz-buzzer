<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quizduell</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
   :root{
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    --bg0:#070A12;
    --bg1:#0B1020;
    --stroke: rgba(255,255,255,0.12);
    --stroke2: rgba(255,255,255,0.18);
    --text:#EAF0FF;
    --muted: rgba(234,240,255,0.72);
    --accent:#7C5CFF;
    --accent2:#24D8FF;
    --bad:#FF4D6D;
    --gold:#FFD66E;
    --good:#38F6A6;
  }

  body{
    margin:0;
    color:var(--text);
    background:
      radial-gradient(1200px 700px at 15% 0%, rgba(124,92,255,0.25), transparent 55%),
      radial-gradient(900px 600px at 85% 15%, rgba(36,216,255,0.18), transparent 60%),
      radial-gradient(1000px 700px at 40% 100%, rgba(255,77,109,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
  }

  .app{
    padding:16px;
    display:grid;
    gap:14px;
    height:100vh;
    box-sizing:border-box;
  }

  .top{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    padding:12px 14px;
    border-radius:18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    border:1px solid var(--stroke);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }

  .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

  .badge{
    padding:9px 12px;
    border-radius:14px;
    border:1px solid var(--stroke2);
    background: rgba(0,0,0,0.22);
    font-weight:850;
    letter-spacing:0.2px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }

  input, button{
    border-radius: 14px;
    border: 1px solid var(--stroke2);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
    transition: transform 120ms ease, background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
  }

  button{
    cursor:pointer;
    font-weight:800;
  }
  button:hover{ background: rgba(255,255,255,0.10); transform: translateY(-1px); }
  button:active{ transform: translateY(0px) scale(0.99); }
  button:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

  .danger{ border-color: rgba(255,77,109,0.40); }
  .danger:hover{ background: rgba(255,77,109,0.14); border-color: rgba(255,77,109,0.55); }

  .boardWrap{
    border-radius:18px;
    border:1px solid var(--stroke);
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
    padding:12px;
    overflow:auto;
    box-shadow: 0 12px 34px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }

  .board{
    display:grid;
    grid-template-columns: repeat(5, minmax(180px, 1fr));
    grid-template-rows: 74px repeat(5, 84px);
    gap:12px;
    min-width: 920px;
  }

  .cell{
    border-radius:18px;
    border:1px solid var(--stroke);
    background: rgba(0,0,0,0.18);
    display:grid;
    place-items:center;
    padding:12px;
    text-align:center;
    user-select:none;
  }

  .headerCell{
    font-weight:950;
    font-size:16px;
    letter-spacing:0.3px;
    color: rgba(234,240,255,0.92);
    background:
      linear-gradient(135deg, rgba(124,92,255,0.22), rgba(36,216,255,0.14)),
      rgba(0,0,0,0.20);
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 10px 26px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.10);
  }

  .qbtn{
    width:100%;
    height:100%;
    border-radius:18px;
    font-size:22px;
    font-weight:950;
    letter-spacing:0.2px;
    background:
      radial-gradient(120px 90px at 30% 20%, rgba(124,92,255,0.22), transparent 60%),
      radial-gradient(140px 100px at 80% 80%, rgba(36,216,255,0.18), transparent 60%),
      rgba(0,0,0,0.22);
    border:1px solid rgba(255,255,255,0.14);
    box-shadow: 0 10px 28px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .qbtn.used{
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
    border-style: dashed;
    opacity:.55;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .scores{
    display:grid;
    grid-template-columns: repeat(6, minmax(160px, 1fr));
    gap:12px;
  }

  .player{
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.12);
    background:
      radial-gradient(220px 120px at 20% 0%, rgba(124,92,255,0.14), transparent 70%),
      rgba(0,0,0,0.20);
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .player.me{
    outline:2px solid rgba(36,216,255,0.45);
    outline-offset:2px;
  }

  .player.winner{
    outline:2px solid rgba(255,214,110,0.70);
    outline-offset:2px;
    box-shadow:
      0 14px 36px rgba(0,0,0,0.36),
      0 0 0 6px rgba(255,214,110,0.12),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .pname{ font-weight:900; color: rgba(234,240,255,0.92); }
  .pscore{ font-weight:950; font-size:22px; min-width:60px; text-align:right; }

  .buzzInline{
    padding:8px 10px;
    border-radius:12px;
    font-weight:950;
    border:1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    cursor:pointer;
  }
  .buzzInline:hover{ background: rgba(255,255,255,0.12); }
  .buzzInline:disabled{ opacity:.55; cursor:not-allowed; }

  /* Modal */
  .backdrop{
    position:fixed;
    inset:0;
    background: rgba(2,4,10,0.72);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .backdrop.show{ display:flex; }

  .modal{
    width:min(760px, 100%);
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.14);
    background:
      radial-gradient(480px 220px at 15% 0%, rgba(124,92,255,0.25), transparent 60%),
      radial-gradient(480px 220px at 85% 0%, rgba(36,216,255,0.18), transparent 60%),
      rgba(10,14,30,0.96);
    padding:16px;
    display:grid;
    gap:12px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.55);
  }
  .modal h3{ margin:0; font-size:18px; font-weight:950; letter-spacing:0.2px; }
  .modal .meta{ opacity:.78; font-size:13px; color: var(--muted); }
  .modal .qtext{
    font-size:22px;
    line-height:1.4;
    font-weight:900;
    text-align:center;
  }

  .modal .answer{
    padding:12px;
    border-radius:16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display:none;
    white-space:pre-wrap;
  }
  .modal .answer.show{ display:block; }

  .modal .actions{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    flex-wrap:wrap;
    align-items:center;
  }

  .modal img{
    width: 100%;
    max-width: 520px;
    height: 260px;
    object-fit: contain;
    background: rgba(0,0,0,0.35);
    border-radius:16px;
    margin: 0 auto 14px;
    display:block;
    box-shadow: 0 12px 30px rgba(0,0,0,0.45);
  }

  @media (max-width: 760px){
    .board{ min-width: 720px; }
    .scores{ grid-template-columns: repeat(2, minmax(160px, 1fr)); }
  }
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div class="row">
        <div class="badge" id="turnBadge">Verbinde…</div>
        <div class="badge" id="buzzBadge">Buzzer: —</div>
        <button id="toggleBuzz">🔒 Buzzer sperren</button>
        <button id="resetBuzz">🔁 Buzzer Reset</button>
        <button id="resetGame" class="danger">Game Reset</button>
      </div>

      <div class="row">
        <button id="round2Btn">🔥 Runde 2</button>
      </div>
    </div>

    <div class="boardWrap">
      <div class="board" id="board"></div>
    </div>

    <div class="scores" id="scores"></div>
  </div>

  <!-- Modal -->
  <div class="backdrop" id="backdrop">
    <div class="modal">
      <div>
        <h3 id="mTitle">Kategorie – 100</h3>
        <div class="meta" id="mMeta"></div>
        <div id="buzzWinner" style="font-size:18px;font-weight:950;color:var(--gold);text-align:center;"></div>
      </div>

      <img id="mImage" style="display:none;" />
      <div class="qtext" id="mQuestion"></div>

      <div class="answer" id="mAnswer"></div>

      <div class="actions">
        <button id="showAnswer">Antwort zeigen</button>
        <button id="markWrong" class="danger">Falsch</button>
        <button id="markRight">Richtig (+Punkte)</button>
        <button id="closeModal">Schließen</button>
      </div>
    </div>
  </div>

  <script>
    // ------------------------------
    // 🔊 Optionaler Sound (Browser braucht 1x User-Interaktion)
    // ------------------------------
    const buzzerSound = new Audio("https://actions.google.com/sounds/v1/alarms/buzzer.ogg");
    buzzerSound.preload = "auto";
    let soundEnabled = false;

    function unlockSound(){
      if(soundEnabled) return;
      soundEnabled = true;
      buzzerSound.volume = 0;
      buzzerSound.play().then(() => {
        buzzerSound.pause();
        buzzerSound.currentTime = 0;
        buzzerSound.volume = 1;
      }).catch(() => {});
    }

    document.addEventListener("click", unlockSound, { once:true });
    document.addEventListener("touchstart", unlockSound, { once:true });
    document.addEventListener("keydown", unlockSound, { once:true });

    // ------------------------------
    // Daten
    // ------------------------------
    const POINTS = [100, 200, 300, 400, 500];

    let round = 1;
    let pointMultiplier = 1;

    const round1Categories = [
      {
        name: "Welche Frage ist es?",
        questions: [
          { points: 100, q: "Der Nil", a: "Wie heißt der längste Fluss der Erde?" },
          { points: 200, q: "Der Mount Everest", a: "Was ist der höchste Berg der Welt?" },
          { points: 300, q: "Der Marianengraben", a: "Wie heißt die tiefste bekannte Stelle der Weltmeere?" },
          { points: 400, q: "196", a: "Wie viele Länder sind aktuell international anerkannt?" },
          { points: 500, q: "299.792 Kilometer pro Sekunde", a: "Wie hoch ist die Lichtgeschwindigkeit im Vakuum?" }
        ]
      },
      {
        name: "Wer kennt mich am Besten?",
        questions: [
          { points: 100, q: "An welchem Datum habe ich Geburtstag?", a: "15.09.1998" },
          { points: 200, q: "Was ist mein Lieblingsanime?", a: "One Piece" },
          { points: 300, q: "In welchem Fußballverein habe ich zuerst gespielt?", a: "Sperber Neukölln" },
          { points: 400, q: "Wie esse ich meinen Döner?", a: "Knoblauch + Scharf, Salat komplett" },
          { points: 500, q: "In welchem Monat und Jahr bin ich in meine Wohnung eingezogen?", a: "Juli 2022" }
        ]
      },
      {
        name: "Wer ist das?",
        questions: [
          { points: 100, q: "Wer ist diese Person?", img: "images/wer-ist-das/israel_kolo.jpg", a: "Israel Kamakawiwo'ole" },
          { points: 200, q: "Wer ist diese Person?", img: "images/wer-ist-das/barack_obama.jpg", a: "Barack Obama" },
          { points: 300, q: "Wer ist diese Person?", img: "images/wer-ist-das/friedrich_merz.jpg", a: "Friedrich Merz" },
          { points: 400, q: "Wer ist diese Person?", img: "images/wer-ist-das/kollegah.jpg", a: "Kollegah" },
          { points: 500, q: "Wer ist diese Person?", img: "images/wer-ist-das/elias_nerlich.jpg", a: "Elias Nerlich" }
        ]
      },
      {
        name: "Sport – Einmal alles",
        questions: [
          { points: 100, q: "Wie nennt man das höchstmögliche Finish im Darts?", a: "170" },
          { points: 200, q: "Welche Rückennummer trug Miroslav Klose bei der Fußball-WM 2014?", a: "11" },
          { points: 300, q: "Was bedeutet der Begriff „Triple Double“ im Basketball?", a: "Zweistellige Werte in drei statistischen Kategorien in einem Spiel" },
          { points: 400, q: "Wie lange hält der Baron-Buff nach dem Töten von Baron Nashor an?", a: "3 Minuten" },
          { points: 500, q: "Wie hoch ist das Netz in der Mitte eines regulären Padel-Feldes?", a: "88 Zentimeter" }
        ]
      },
      {
        name: "Unsere Games",
        questions: [
          { points: 100, q: "Wie viele Runden muss ein Team in Valorant gewinnen, um ein Match regulär zu gewinnen?", a: "13" },
          { points: 200, q: "Wie viele Minuten dauert ein reguläres FIFA-Spiel standardmäßig pro Halbzeit?", a: "6 Minuten" },
          { points: 300, q: "Wie nennt man die Spezialfähigkeit von Michael in GTA 5?", a: "Bullet Time / Zeitlupen-Fähigkeit" },
          { points: 400, q: "Wie lange hält der Baron-Buff nach dem Töten von Baron Nashor an?", a: "3 Minuten" },
          { points: 500, q: "Wofür steht die Abkürzung „MMORPG“?", a: "Massively Multiplayer Online Role-Playing Game" }
        ]
      }
    ];

    const round2Categories = [
      round1Categories[0],
      round1Categories[1],
      round1Categories[2],
      round1Categories[3],
      {
        name: "Morph",
        questions: [
          { points: 600, q: "Welche zwei Personen wurden hier gemorpht?", img: "images/morph/morph1.jpg", a: "Person A + Person B" },
          { points: 600, q: "Welche zwei Personen wurden hier gemorpht?", img: "images/morph/morph2.jpg", a: "Person C + Person D" },
          { points: 600, q: "Welche zwei Personen wurden hier gemorpht?", img: "images/morph/morph3.jpg", a: "Person E + Person F" },
          { points: 600, q: "Welche zwei Personen wurden hier gemorpht?", img: "images/morph/morph4.jpg", a: "Person G + Person H" },
          { points: 600, q: "Welche zwei Personen wurden hier gemorpht?", img: "images/morph/morph5.jpg", a: "Person I + Person J" }
        ]
      }
    ];

    let categories = [...round1Categories];

    // Firebase State
    let used = {};
    let players = [];
    let currentPick = null;

    // Buzzer State
    let buzzerEnabled = true;
    let buzzerState = { lockedBy: null, lockedName: null, lockedAt: null };

    // ------------------------------
    // Firebase setup (Player)
    // ------------------------------
    const params = new URLSearchParams(window.location.search);
    let myId = params.get("id") || sessionStorage.getItem("playerId");
    let myName = sessionStorage.getItem("playerName") || "Spieler";

    if(!myId){
      window.location.href = "index.html";
    }

    const myRef = db.ref("players/" + myId);
    const playersRef = db.ref("players");
    const questionRef = db.ref("game/currentQuestion");
    const buzzerRef = db.ref("game/buzzer");
    const buzzerEnabledRef = db.ref("game/buzzerEnabled");
    const usedRef = db.ref("game/used");
    const roundRef = db.ref("game/roundState");

    // Presence
    myRef.set({ name: myName, score: 0, joinedAt: Date.now() });
    myRef.onDisconnect().remove();

    function updateBadges(){
      document.getElementById("turnBadge").textContent = `Runde ${round} – Du: ${myName}`;

      const bb = document.getElementById("buzzBadge");
      if(!buzzerEnabled){
        bb.textContent = "Buzzer: GESPERRT";
      } else if(buzzerState.lockedBy){
        bb.textContent = `Buzzer: ${buzzerState.lockedName}`;
      } else {
        bb.textContent = "Buzzer: frei";
      }
    }

    // ------------------------------
    // Round sync
    // ------------------------------
    roundRef.once("value").then(s => {
      if(!s.exists()){
        roundRef.set({ round: 1, mult: 1, at: Date.now() });
      }
    });

    roundRef.on("value", snap => {
      const st = snap.val();
      if(!st) return;
      round = st.round || 1;
      pointMultiplier = st.mult || 1;
      categories = (round === 2) ? [...round2Categories] : [...round1Categories];
      renderBoard();
      updateBadges();
    });

    // ------------------------------
    // Used sync
    // ------------------------------
    usedRef.on("value", snap => {
      used = snap.val() || {};
      renderBoard();
    });

    // ------------------------------
    // Players sync
    // ------------------------------
    playersRef.on("value", snap => {
      const list = [];
      snap.forEach(ch => {
        const v = ch.val();
        if(v && v.name) list.push({ id: ch.key, name: v.name, score: v.score || 0 });
      });
      players = list;
      renderScores();
    });

    // ------------------------------
    // Buzzer enabled sync (lock/frei)
    // ------------------------------
    buzzerEnabledRef.once("value").then(s => {
      if(!s.exists()) buzzerEnabledRef.set(true);
    });

    buzzerEnabledRef.on("value", snap => {
      buzzerEnabled = (snap.val() !== false);
      const btn = document.getElementById("toggleBuzz");
      btn.textContent = buzzerEnabled ? "🔒 Buzzer sperren" : "🔓 Buzzer freigeben";
      updateBadges();
      renderScores();
    });

    document.getElementById("toggleBuzz").addEventListener("click", () => {
      buzzerEnabledRef.set(!buzzerEnabled);
    });

    document.getElementById("resetBuzz").addEventListener("click", () => {
      buzzerRef.set({ lockedBy: null, lockedName: null, lockedAt: null });
    });

    // ------------------------------
    // Buzzer state sync (wer hat gebuzzert?)
    // ------------------------------
    buzzerRef.on("value", snap => {
      const b = snap.val() || { lockedBy: null, lockedName: null, lockedAt: null };
      const prevLockedBy = buzzerState.lockedBy;

      buzzerState = b;

      // Sound nur wenn neu gelockt
      if(!prevLockedBy && b.lockedBy){
        buzzerSound.currentTime = 0;
        buzzerSound.play().catch(() => {});
      }

      // Modal-Text (falls Modal offen)
      const winnerDisplay = document.getElementById("buzzWinner");
      if(winnerDisplay){
        winnerDisplay.textContent = b.lockedBy ? `🏆 ${b.lockedName} ist dran!` : "";
      }

      updateBadges();
      renderScores();
    });

    // ------------------------------
    // Render
    // ------------------------------
    function renderBoard(){
      const board = document.getElementById("board");
      board.innerHTML = "";

      categories.forEach((cat) => {
        const cell = document.createElement("div");
        cell.className = "cell headerCell";
        cell.textContent = cat.name;
        board.appendChild(cell);
      });

      POINTS.forEach((pts, rowIdx) => {
        categories.forEach((cat, ci) => {
          const qi = rowIdx;
          const q = cat.questions[qi];

          const key = `${ci}-${qi}`;
          const btn = document.createElement("button");
          btn.className = "qbtn" + (used[key] ? " used" : "");
          btn.textContent = q.points * pointMultiplier;
          btn.disabled = !!used[key];

          btn.addEventListener("click", () => openQuestion(ci, qi));
          board.appendChild(btn);
        });
      });
    }

    function renderScores(){
      const root = document.getElementById("scores");
      root.innerHTML = "";

      players
        .slice()
        .sort((a,b) => b.score - a.score)
        .forEach(p => {
          const el = document.createElement("div");

          const isMe = (p.id === myId);
          const isWinner = (buzzerState.lockedBy && buzzerState.lockedBy === p.id);

          el.className = "player" + (isMe ? " me" : "") + (isWinner ? " winner" : "");

          const canBuzz =
            isMe &&
            buzzerEnabled &&
            (!buzzerState.lockedBy); // nur wenn noch niemand gebuzzert hat

          el.innerHTML = `
            <div>
              <div class="pname">${p.name}${isMe ? " (du)" : ""}</div>
              <div style="opacity:.75;font-size:12px;margin-top:2px;">
                ${isWinner ? "🏆 hat gebuzzert" : "&nbsp;"}
              </div>
            </div>

            <div style="display:flex;gap:10px;align-items:center;">
              ${isMe ? `
                <button class="buzzInline" ${canBuzz ? "" : "disabled"}>
                  ${!buzzerEnabled ? "🔒 Gesperrt" : (buzzerState.lockedBy ? "⛔" : "🔔 Buzzern")}
                </button>
              ` : ""}
              <div class="pscore">${p.score}</div>
            </div>
          `;

          if(isMe){
            const b = el.querySelector(".buzzInline");
            if(b){
              b.addEventListener("click", () => {
                unlockSound();
                if(!buzzerEnabled) return;

                // First press wins
                buzzerRef.transaction(cur => {
                  if(cur && cur.lockedBy) return;
                  return { lockedBy: myId, lockedName: myName, lockedAt: Date.now() };
                });
              });
            }
          }

          root.appendChild(el);
        });
    }

    // ------------------------------
    // Question open/close (global)
    // ------------------------------
    function openQuestion(ci, qi){
      questionRef.set({
        round,
        mult: pointMultiplier,
        ci,
        qi,
        openedAt: Date.now(),
        openedBy: myId
      });

      // Buzzer für diese Frage resetten (optional – wenn du das nicht willst, entferne die nächste Zeile)
      buzzerRef.set({ lockedBy: null, lockedName: null, lockedAt: null });
    }

    questionRef.on("value", snap => {
      const qstate = snap.val();
      if(!qstate){
        document.getElementById("backdrop").classList.remove("show");
        currentPick = null;
        return;
      }

      round = qstate.round || round;
      pointMultiplier = qstate.mult || pointMultiplier;
      categories = (round === 2) ? [...round2Categories] : [...round1Categories];

      const { ci, qi } = qstate;
      currentPick = { ci, qi };

      const q = categories[ci]?.questions[qi];
      if(!q) return;

      document.getElementById("mTitle").textContent =
        `${categories[ci].name} – ${q.points * pointMultiplier}`;
      document.getElementById("mMeta").textContent =
        `Offen für alle – Buzzern im eigenen Spielerfeld`;

      document.getElementById("mQuestion").textContent = q.q;

      const imgEl = document.getElementById("mImage");
      if (q.img) {
        imgEl.src = q.img;
        imgEl.style.display = "block";
      } else {
        imgEl.style.display = "none";
      }

      document.getElementById("mAnswer").textContent = q.a;
      document.getElementById("mAnswer").classList.remove("show");

      // Gewinneranzeige im Modal live aus buzzerState
      document.getElementById("buzzWinner").textContent =
        buzzerState.lockedBy ? `🏆 ${buzzerState.lockedName} ist dran!` : "";

      document.getElementById("backdrop").classList.add("show");
      updateBadges();
    });

    function closeModal(){
      // global schließen (für alle)
      questionRef.set(null);
      document.getElementById("backdrop").classList.remove("show");
      currentPick = null;
    }

    // ------------------------------
    // Wertung: Punkte an Buzzer-Winner
    // ------------------------------
    function markResult(isRight){
      if(!currentPick) return;

      buzzerRef.once("value").then(bs => {
        const b = bs.val() || {};
        if(!b.lockedBy){
          alert("Erst buzzern lassen!");
          return;
        }

        const { ci, qi } = currentPick;
        const key = `${ci}-${qi}`;
        const q = categories[ci].questions[qi];

        // Frage used markieren (global)
        usedRef.child(key).set(true);

        const delta = isRight ? (q.points * pointMultiplier) : -Math.floor((q.points * pointMultiplier) / 2);
        const winnerId = b.lockedBy;

        db.ref("players/" + winnerId + "/score").transaction(s => (s || 0) + delta);

        // Nach Wertung Buzzer wieder frei
        buzzerRef.set({ lockedBy: null, lockedName: null, lockedAt: null });

        closeModal();
      });
    }

    // ------------------------------
    // Controls
    // ------------------------------
    document.getElementById("showAnswer").addEventListener("click", () => {
      document.getElementById("mAnswer").classList.toggle("show");
    });

    document.getElementById("markWrong").addEventListener("click", () => markResult(false));
    document.getElementById("markRight").addEventListener("click", () => markResult(true));
    document.getElementById("closeModal").addEventListener("click", closeModal);

    // Runde 2 (global)
    document.getElementById("round2Btn").addEventListener("click", () => {
      roundRef.set({ round: 2, mult: 2, at: Date.now() });
      usedRef.set(null);
      alert("🔥 Runde 2 gestartet! Doppelte Punkte!");
    });

    // Game Reset (global)
    document.getElementById("resetGame").addEventListener("click", () => {
      if(!confirm("Wirklich ALLES zurücksetzen? (Spieler, Punkte, Fragen, Buzzer, Lock)")) return;
      db.ref("game").set(null);
      db.ref("players").set(null);
      alert("Reset ausgeführt. Bitte neu beitreten.");
      window.location.href = "index.html";
    });

    // Initial UI
    renderBoard();
    renderScores();
    updateBadges();
  </script>
</body>
</html>
